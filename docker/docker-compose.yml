# docker-compose.yml
#
# بيشغل الـ services دي مع بعض:
#   - PostgreSQL  → الـ relational DB
#   - Qdrant      → الـ vector DB
#
# تشغيل:
#   docker-compose up -d
#
# وقف:
#   docker-compose down

version: "3.9"

services:

  # ──────────────────────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: marketing_rag_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: marketing_rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # postgres_data → بيحفظ الداتا حتى لو الـ container اتوقف
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────
  # Qdrant
  # ──────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: marketing_rag_qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
      # qdrant_data → بيحفظ الـ vectors حتى لو الـ container اتوقف

# ──────────────────────────────────────────────────────
# Volumes
# بتحفظ الداتا على الـ machine بتاعتك
# ──────────────────────────────────────────────────────
volumes:
  postgres_data:
  qdrant_data: